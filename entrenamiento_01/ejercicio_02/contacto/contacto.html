<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contacto recetas</title>

        <link rel="stylesheet" href="../estilos/style_contacto.css">
    </head>
    <body>
        <header class="indice_recetas_home">
            <ul>
                <li><a href="../recetas.html">Home</a></li>
                <li>|</li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </header>

        <main>
            <div class="contenedor_formulario">
                <form action="#" class="formulario">

                    <div class="campo">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="campo">
                        <label for="telefono">Tel:</label>
                        <input type="tel" id="telefono" name="telefono" required>
                    </div>

                    <div class="campo campo_mensajes">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" required></textarea>
                    </div>

                    <div class="botones">
                        <button type="submit" class="boton_enviar">Enviar</button>
                        <button type="reset" class="boton_cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <p>Todos los derechos reservados</p>
        </footer>
    </body>
</html>
